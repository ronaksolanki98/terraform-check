name: Deploy Terraform Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "infrastructure/terraform/**"
      - "infrastructure/scripts/bootstrap_tf_backend.sh"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_ROOT: infrastructure/terraform
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_STORAGE_USE_AZUREAD: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_BACKEND_RESOURCE_GROUP: "devbridge-tfstate-rg"
  TF_BACKEND_STORAGE_ACCOUNT: "devbridgetfstate01"
  TF_BACKEND_CONTAINER: "tfstate"
  TF_BACKEND_KEY: "platform/prod.tfstate"
  AZURE_LOCATION: "Central India"

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required secrets
        run: |
          required_vars=(
            ARM_CLIENT_ID
            ARM_TENANT_ID
            ARM_SUBSCRIPTION_ID
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required value: ${var_name}"
              exit 1
            fi
          done

      - name: Bootstrap Terraform backend blob storage
        working-directory: .
        run: bash infrastructure/scripts/bootstrap_tf_backend.sh

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="tenant_id=${ARM_TENANT_ID}" \
            -backend-config="client_id=${ARM_CLIENT_ID}" \
            -backend-config="subscription_id=${ARM_SUBSCRIPTION_ID}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
